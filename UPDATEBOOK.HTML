
<!DOCTYPE html>
<html ng-app="UpdateBookApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Book</title>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { 
    font-family:Bookman old Style,Times New Roman; 
    background-image:url('book.jpg'); 
    padding: 40px; 
    text-align:center;
  }
  .container { 
    max-width: 650px; 
    margin: auto; 
    background-color: rgba(245, 222, 179, 0.95);  
    padding: 30px; 
    border-radius: 15px; 
    box-shadow: 0 6px 20px rgba(0,0,0,0.1); 
  }
  label { 
    font-weight: 500; 
    color: #495057; 
    margin-bottom: 5px;
    display: block;
  }
  select.form-select {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #ced4da;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    margin-bottom: 20px;
    transition: border 0.3s;
  }
  select.form-select:focus {
    border-color: #ff6b81;
    outline: none;
  }
  input.form-control {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #ced4da;
    margin-bottom: 15px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    transition: border 0.3s;
  }
  input.form-control:focus {
    border-color: #ff6b81;
    outline: none;
  }
  button {
    border-radius: 8px;
    padding: 8px 18px;
    font-weight: 500;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .btn-success {
    background: linear-gradient(90deg, #28a745, #5cd65c);
    border: none;
    color: #fff;
  }
  .btn-secondary {
    background-color: #6c757d;
    border: none;
    color: #fff;
  }
  .back-btn {
    background-color: #495057;
    color: #fff;
    margin-bottom: 25px;
  }
  .back-btn:hover {
    background-color: #343a40;
  }
</style>
</head>
<body ng-controller="UpdateBookController">
<div class="container">
    <h2 style="color: #ff6b81">Update Book</h2>
    <!-- Select Book -->
    <label>Select Book to Update:</label>
    <select class="form-select mb-3"
            ng-model="selectedBookId"
            ng-options="book._id as (book.title + ' by ' + book.author) for book in books"
            ng-change="loadBook()">
        <option value="">-- Select a book --</option>
    </select>
    <!-- Update Form -->
    <form name="updateForm" ng-submit="updateBook()" ng-if="bookData._id">
        <input type="text" class="form-control" placeholder="Title" ng-model="bookData.title" required><br>
        <input type="text" class="form-control" placeholder="Author" ng-model="bookData.author" required><br>
        <input type="text" class="form-control" placeholder="Genre" ng-model="bookData.genre" required><br>
        <input type="number" class="form-control" placeholder="Year" ng-model="bookData.year" required min="1900"><br>
        <button type="submit" class="btn btn-success">Update Book</button>
        <button type="button" class="btn btn-secondary" ng-click="resetForm()">Cancel</button>
    </form>
    <button class="btn btn-primary back-btn" ng-click="goHome()">← Back to Home</button>
</div>
<script>
angular.module('UpdateBookApp', [])
.controller('UpdateBookController', function($scope, $http) {
    $scope.books = [];
    $scope.bookData = {};
    $scope.selectedBookId = null;
    function loadBooks() {
        $http.get('http://localhost:3000/books')
        .then(function(response) {
            $scope.books = response.data;
        }, function(error) {
            console.error('Error fetching books:', error);
            alert('❌ Error loading books. Please check backend connection.');
        });
    }
    $scope.loadBook = function() {
        if ($scope.selectedBookId) {
            const selected = $scope.books.find(b => b._id === $scope.selectedBookId);
            if (selected) {
                $scope.bookData = angular.copy(selected);
            }
        }
    };
    $scope.updateBook = function() {
        $http.put('http://localhost:3000/books/' + $scope.bookData._id, $scope.bookData)
        .then(function(response) {
            alert('✅ Book updated successfully!');
            $scope.resetForm();
            loadBooks(); // refresh list
        }, function(error) {
            console.error('Error updating book:', error);
            alert('❌ Failed to update book.');
        });
    };
    $scope.resetForm = function() {
        $scope.bookData = {};
        $scope.selectedBookId = null;
        if ($scope.updateForm) {
            $scope.updateForm.$setPristine();
            $scope.updateForm.$setUntouched();
        }
    };
    $scope.goHome = function() {
        window.location.href = 'home.html';
    };
    loadBooks();
});
</script>
</body>
</html>
