
<!DOCTYPE html>
<html ng-app="ViewBookApp">
<head>
  <title>View Books</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
  body {
    font-family: Bookman Old Style,Times New Roman;
    background-image:url('book.jpg');
    padding: 40px 20px;
  }
  .container {
    background-color: rgba(245, 222, 179, 0.95); 
    padding: 30px 25px;
    border-radius: 15px;
    max-width: 950px;
    margin: auto;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
  }
  h2 {
    text-align: center;
    color: #ff6b81;
    margin-bottom: 25px;
    font-weight: 600;
  }
  input[type="text"] {
    width: 100%;
   padding: 12px 15px;
    margin-bottom: 20px;
    border-radius: 10px;
    border: 1px solid #ced4da;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    transition: border 0.3s;
  }
  input[type="text"]:focus {
    border-color: #ff6b81;
    outline: none;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px;
  }
  th {
    background-color: #ff6b81;
    color: white;
    padding: 12px 10px;
    border-radius: 10px 10px 0 0;
    text-align: center;
  }
  td {
    background-color: #ffffff;
    padding: 12px 10px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  tr:hover td {
    background-color: #f1f3f5;
    transition: background 0.3s;
  }
  .no-data {
    text-align: center;
    color: #6c757d;
    font-style: italic;
    padding: 15px 0;
  }
  a.btn, button.btn {
    border-radius: 8px;
    padding: 8px 18px;
    font-weight: 500;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  a.btn-success {
    background: linear-gradient(90deg, #28a745, #5cd65c);
    border: none;
    color: #fff;
  }
  a.btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  button.btn-primary {
    background: linear-gradient(90deg, #007bff, #339cff);
    border: none;
    color: #fff;
  }
  button.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .btn-home {
    float: right;
  }

  @media screen and (max-width: 768px) {
    .container {
      padding: 20px 15px;
    }
    table, th, td {
      font-size: 14px;
    }
    .btn-home, a.btn {
      width: 100%;
      margin-bottom: 15px;
    }
  }
</style>
</head>
<body ng-controller="ViewBookController">
  <div class="container">
    <div>
      <a href="addBook.html" class="btn btn-success">➕ Add New Book</a>
      <button class="btn btn-primary btn-home" ng-click="goHome()">🏠 Home</button>
    </div>
    <h2>📚 View All Books</h2>
    <input type="text" ng-model="search.$" placeholder="Search by title, author, or genre">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Title</th>
          <th>Author</th>
          <th>Genre</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="book in books | filter:search">
          <td>{{ $index + 1 }}</td>
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>{{ book.genre }}</td>
          <td>{{ book.year }}</td>
        </tr>
        <tr ng-if="(books | filter:search).length === 0">
          <td colspan="5" class="no-data">No books available.</td>
        </tr>
      </tbody>
    </table>
  </div>
  <script>
    angular.module('ViewBookApp', [])
    .controller('ViewBookController', function($scope, $http) {
      $scope.books = [];
      $http.get('http://localhost:3000/books')
      .then(function(response) {
        $scope.books = response.data;
      }, function(error) {
        console.error('Error fetching books:', error);
        alert('❌ Failed to load books. Please check backend connection.');
      });
      $scope.goHome = function() {
        window.location.href = 'home.html';
      };
    });
  </script>
</body>
</html>
